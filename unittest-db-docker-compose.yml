# This Docker compose file starts up local database instances for SMP building
# Run like this:
# docker compose -f unittest-db-docker-compose.yml up
# docker compose -f unittest-db-docker-compose.yml down
services:
  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_DATABASE: peppol-report-test
    ports:
      - "27017:27017"

  postgres:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: peppol-report
      POSTGRES_USER: peppol
      POSTGRES_PASSWORD: peppol
    volumes:
      - pg18data:/var/lib/postgresql
 
#  pg-adminer:
#    image: adminer
#    restart: always
#    ports:
#      - 8080:8080
 
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: peppol-report
      MYSQL_USER: peppol
      MYSQL_PASSWORD: peppol
    ports:
      - "3306:3306"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Peppol_Strong!Pass1"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Peppol_Strong!Pass1" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Peppol_Strong!Pass1" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'peppol-report') CREATE DATABASE [peppol-report];"

volumes:
  pg18data:

