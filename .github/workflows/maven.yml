# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java#apache-maven-with-a-settings-path

name: Maven deploy Snapshots

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21, 25 ]
    name: Java ${{ matrix.java }} build

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: peppol
          MYSQL_DATABASE: peppol-report
          MYSQL_USER: peppol
          MYSQL_PASSWORD: peppol
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Peppol_Strong!Pass1"
        ports:
          - 1433:1433
        options: --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Peppol_Strong!Pass1' -C -Q 'SELECT 1' || exit 1" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=10s

    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - uses: actions/checkout@v6

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: 'adopt'
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD

    - name: Cache local Maven repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.10.0
      with:
        mongodb-version: '6.0'

    - name: Start PostgreSQL
      uses: ikalnytskyi/action-setup-postgres@v6
      with:
        username: peppol
        password: peppol
        database: peppol-report
        port: 5432
      id: postgres

    - name: Create SQL Server database
      run: docker exec $(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest") /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Peppol_Strong!Pass1' -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'peppol-report') CREATE DATABASE [peppol-report];"

    - name: Publish to the Maven Central Repository
      run: mvn --batch-mode --update-snapshots -P release-snapshot deploy
      if: matrix.java == 17
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

    - name: Maven Build
      run: mvn --batch-mode --update-snapshots install
      if: matrix.java != 17
